<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>到達運動判断課題</title>

  <!-- jsPsych 8 本体とプラグイン -->
  <script src="https://unpkg.com/jspsych@8.2.1"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.6"></script>
  <link href="https://unpkg.com/jspsych@8.2.1/css/jspsych.css" rel="stylesheet">

  <style>
    /* ---- 初期フォーム（参加者ID・デモグラフィック） ---- */
    #entry-form { max-width: 480px; margin: 0 auto; text-align: left; }
    #entry-form fieldset {
      border: 1px solid #ccc; border-radius: 8px;
      margin-bottom: 16px; padding: 12px 16px;
    }
    #entry-form legend { font-weight: bold; padding: 0 8px; }
    #entry-form input[type="text"], #entry-form input[type="number"] {
      font-size: 18px; padding: 6px 10px;
      border: 1px solid #999; border-radius: 6px;
    }
    #entry-form label { margin-right: 14px; font-size: 17px; }
    .note { color: #666; font-size: 14px; }

    /* ---- タッチ回答用の矢印キー風ボタン ----
       逆T字配置（上段：↑，下段：← ↓ →）。反応に使うのは↑↓のみ。 */
    .arrow-trial #jspsych-html-button-response-btngroup {
      position: fixed;
      bottom: 32px;
      display: grid;
      grid-template-columns: repeat(3, 84px);
      grid-template-rows: repeat(2, 84px);
      gap: 10px;
    }
    .arrow-trial.pos-right #jspsych-html-button-response-btngroup { right: 32px; }
    .arrow-trial.pos-left  #jspsych-html-button-response-btngroup { left: 32px; }

    .key-up    { grid-column: 2; grid-row: 1; }
    .key-left  { grid-column: 1; grid-row: 2; }
    .key-down  { grid-column: 2; grid-row: 2; }
    .key-right { grid-column: 3; grid-row: 2; }

    .arrow-key-btn {
      width: 84px;
      height: 84px;
      font-size: 36px;
      border: 3px solid #555;
      border-radius: 12px;
      background: #f5f5f5;
      box-shadow: 0 4px 0 #bbb;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      cursor: pointer;
      padding: 0;
    }
    .arrow-key-btn:active {
      box-shadow: 0 1px 0 #bbb;
      transform: translateY(3px);
    }
    .arrow-key-btn.decorative {
      opacity: 0.35;
      pointer-events: none;
    }

    .stim-area { font-size: 0; }
    .scene-svg { width: min(900px, 92vw); height: auto; } /* 小さい画面では自動縮小 */

    /* ---- 実験中（全画面化後）のダークモード ----
       全画面化のタイミングで <html> に .dark-mode を付与して有効化する。
       デモグラフィック入力画面はこのクラスが付く前なので影響を受けない。 */
    html.dark-mode, html.dark-mode body {
      background-color: #000;
      color: #fff;
    }
    html.dark-mode .note { color: #aaa; }   /* 補足テキストは薄いグレーに */
    html.dark-mode .arrow-key-btn {
      background: #2b2b2b;
      color: #fff;
      border-color: #999;
      box-shadow: 0 4px 0 #555;
    }
    html.dark-mode .arrow-key-btn:active { box-shadow: 0 1px 0 #555; }

    /* ---- 教示用の例示画像 ---- */
    .inst-img {
      display: block;
      max-width: min(420px, 80vw);
      height: auto;
      margin: 16px auto;
      border-radius: 8px;
      background: #fff;      /* 黒背景でも見やすいよう白地に載せる */
      padding: 8px;
    }
  </style>
</head>
<body></body>
<script>
/* =========================================================
   設定（実験デザインに合わせてここだけ編集すればよい）
========================================================= */
const CONFIG = {
  // DataPipe（https://pipe.jspsych.org）の実験ID。空文字ならローカルCSV保存になる
  DATAPIPE_EXPERIMENT_ID: "zUWWco1Owpur",

  N_BLOCKS: 6,             // 本試行（156試行）を分割するブロック数（156/6 = 26試行/ブロック）
  PRACTICE_TRIALS: 10,     // 練習試行数（22点から重複を許してランダム選択）

  // 教示画面に挿入する腕運動の例示画像。実験HTMLと同じ場所に置いたファイル名
  // （またはサブフォルダ付きの相対パス，例 "img/arm_movement.png"）を指定する。
  // 空文字 "" にすると画像なしで教示文のみ表示される。
  INSTRUCTION_IMAGE: "arm_movement.png",

  FIXATION_MIN: 400,       // 注視点提示時間の下限（ms）
  FIXATION_MAX: 900,       // 注視点提示時間の上限（ms）
  ISI: 500,                // 回答後，次試行開始までの刺激間間隔（ms）
  BLOCK_START_BLANK: 1000, // 実験開始時・休憩後の再開時に挿入する空白画面（ms）

  /* ---- 刺激場面のジオメトリ ----
     座標系：場面SVGの中心を原点(0,0)とし，x正=右，y正=上（水準の直感に合わせるため
     内部でSVG座標に変換する）。単位はSVG座標（表示は下のDISPLAY_WIDTHで一括拡縮）。*/
  SCENE: {
    DISPLAY_WIDTH: 900,    // 画面上の表示幅（px）。CSSで min(900px, 92vw) に縮小対応
    VIEW_W: 1000,          // SVG座標系の幅（±450の円が収まるよう余白込み）
    VIEW_H: 560,           //          高さ（ダミー最上端の障害物±255が収まる高さ）

    START_X: -450,         // スタート円の中心x（左側）
    GOAL_X: 450,           // ゴール円の中心x（右側）
    START_R: 22.5,         // スタート円の半径（最小）
    GOAL_R: 37.5,          // ゴール円の半径（中）
    OBSTACLE_R: 120,       // 障害物円の半径（最大）

    OBSTACLE_X_NEAR: -120, // 障害物の水平位置：Near（スタート寄り）
    OBSTACLE_X_FAR: 120,   //                   Far（ゴール寄り）

    STEP_Y: 27,            // 高さ1水準あたりの垂直間隔
    MAIN_LEVELS: [-3, -2, -1, 0, 1, 2, 3],  // 本試行の高さ7水準（正=上，負=下）
    DUMMY_LEVELS: [-5, -4, 4, 5],           // ダミー試行の高さ4水準
    MAIN_REPS: 10,         // 本試行：各点の繰り返し（2×7×10 = 140）
    DUMMY_REPS: 2,         // ダミー：各点の繰り返し（2×4×2 = 16）

    COLOR_START: "#8a8a8a",     // グレー
    COLOR_GOAL: "#5ec8f2",      // スカイブルー
    COLOR_OBSTACLE: "#e03131"   // レッド
  }
};

// 反応の割り当て（キーボード条件）：↑=障害物の上側を回避，↓=下側を回避
const KEY_UP = "ArrowUp";
const KEY_DOWN = "ArrowDown";

/* =========================================================
   刺激場面の描画
========================================================= */
// 障害物の中心座標（x, y。yは正=上）を受け取り，場面全体のSVGを返す
function sceneSVG(obs_x, obs_y, display_width) {
  const S = CONFIG.SCENE;
  const w = display_width || S.DISPLAY_WIDTH;
  // 内部座標系：中心原点。SVGはy正=下なので符号を反転する
  const toSvgY = (y) => -y;
  return `
  <svg class="scene-svg" style="width:min(${w}px, 92vw);"
       viewBox="${-S.VIEW_W / 2} ${-S.VIEW_H / 2} ${S.VIEW_W} ${S.VIEW_H}"
       xmlns="http://www.w3.org/2000/svg">
    <circle cx="${S.START_X}" cy="0" r="${S.START_R}" fill="${S.COLOR_START}"/>
    <circle cx="${S.GOAL_X}"  cy="0" r="${S.GOAL_R}"  fill="${S.COLOR_GOAL}"/>
    <circle cx="${obs_x}" cy="${toSvgY(obs_y)}" r="${S.OBSTACLE_R}" fill="${S.COLOR_OBSTACLE}"/>
  </svg>`;
}

function stimulusHTML(obs_x, obs_y) {
  return `<div class="stim-area">${sceneSVG(obs_x, obs_y)}</div>`;
}

/* =========================================================
   初期化
========================================================= */
const jsPsych = initJsPsych({
  on_finish: () => {
    if (!CONFIG.DATAPIPE_EXPERIMENT_ID) {
      jsPsych.data.get().localSave("csv", "data_" + participant_id + ".csv");
    }
  }
});

/* --- 表示環境メタデータの記録（全行に付与される） --- */
jsPsych.data.addProperties({
  screen_width: screen.width,
  screen_height: screen.height,
  viewport_width_initial: window.innerWidth,
  viewport_height_initial: window.innerHeight,
  device_pixel_ratio: window.devicePixelRatio,
  user_agent: navigator.userAgent
});

// 参加者ID：URLパラメータ ?id=XXX があればそれを初期値に，無ければランダム生成
let participant_id =
  jsPsych.data.getURLVariable("id") || jsPsych.randomization.randomID(8);

// 入力方法（自動判定。フォームで参加者が変更可能）
let use_keyboard = !(("ontouchstart" in window) || navigator.maxTouchPoints > 0);

// タッチUIの配置（右利き→右下，左利き→左下）
let button_position = "right";

/* =========================================================
   試行リストの生成
========================================================= */
function obstacleX(distance) {
  return distance === "near" ? CONFIG.SCENE.OBSTACLE_X_NEAR : CONFIG.SCENE.OBSTACLE_X_FAR;
}

function makeConditionObject(distance, level, kind) {
  return {
    distance: distance,                       // "near" / "far"
    height_level: level,                      // 整数（正=上，負=下）
    obs_x: obstacleX(distance),
    obs_y: level * CONFIG.SCENE.STEP_Y,       // 内部座標（正=上）
    trial_kind: kind                          // "main" / "dummy"
  };
}

// 本試行140 + ダミー16 = 156試行をまとめてシャッフル（ダミーがランダムに混入される）
function makeMainTrialList() {
  const list = [];
  for (const dist of ["near", "far"]) {
    for (const lv of CONFIG.SCENE.MAIN_LEVELS) {
      for (let i = 0; i < CONFIG.SCENE.MAIN_REPS; i++) {
        list.push(makeConditionObject(dist, lv, "main"));
      }
    }
    for (const lv of CONFIG.SCENE.DUMMY_LEVELS) {
      for (let i = 0; i < CONFIG.SCENE.DUMMY_REPS; i++) {
        list.push(makeConditionObject(dist, lv, "dummy"));
      }
    }
  }
  return jsPsych.randomization.shuffle(list);
}

// 練習：全22点（2距離 × 11水準）から重複を許して PRACTICE_TRIALS 回ランダム抽出
function makePracticeTrialList() {
  const all22 = [];
  const allLevels = [...CONFIG.SCENE.MAIN_LEVELS, ...CONFIG.SCENE.DUMMY_LEVELS];
  for (const dist of ["near", "far"]) {
    for (const lv of allLevels) {
      all22.push(makeConditionObject(dist, lv, "practice"));
    }
  }
  return jsPsych.randomization.sampleWithReplacement(all22, CONFIG.PRACTICE_TRIALS);
}

/* =========================================================
   タイムライン構築
========================================================= */
const timeline = [];

/* --- 画像の事前読み込み（教示画像が指定されている場合のみ） --- */
if (CONFIG.INSTRUCTION_IMAGE) {
  timeline.push({
    type: jsPsychPreload,
    images: [CONFIG.INSTRUCTION_IMAGE],
    show_progress_bar: false,
    error_message: "画像の読み込みに失敗しました。ページを再読み込みしてください。",
    on_error: () => console.warn("教示画像が読み込めません: " + CONFIG.INSTRUCTION_IMAGE)
  });
}

/* --- 最初の画面：参加者ID・デモグラフィック・回答方法 --- */
timeline.push({
  type: jsPsychSurveyHtmlForm,
  preamble: "<h2>実験を始める前に</h2><p>以下の項目に入力してください。</p>",
  button_label: "次へ",
  html: () => `
  <div id="entry-form">
    <fieldset>
      <legend>参加者ID</legend>
      <input type="text" name="pid" value="${participant_id}" required>
      <p class="note">実験者から指定がある場合は入力・修正してください。</p>
    </fieldset>

    <fieldset>
      <legend>年齢</legend>
      <input type="number" name="age" min="0" max="120" style="width:100px;" required> 歳
    </fieldset>

    <fieldset>
      <legend>性別</legend>
      <label><input type="radio" name="gender" value="male" required> 男性</label>
      <label><input type="radio" name="gender" value="female"> 女性</label><br>
      <label><input type="radio" name="gender" value="other"> その他：
        <input type="text" name="gender_other" style="width:140px;"></label><br>
      <label><input type="radio" name="gender" value="no_answer"> 回答しない</label>
    </fieldset>

    <fieldset>
      <legend>利き手</legend>
      <label><input type="radio" name="handedness" value="right" required> 右利き</label>
      <label><input type="radio" name="handedness" value="left"> 左利き</label>
      <label><input type="radio" name="handedness" value="both"> 両利き</label>
    </fieldset>

    <fieldset>
      <legend>回答方法</legend>
      <label><input type="radio" name="input_method" value="keyboard" ${use_keyboard ? "checked" : ""}>
        キーボード（矢印キー）で回答する</label><br>
      <label><input type="radio" name="input_method" value="button" ${!use_keyboard ? "checked" : ""}>
        画面のボタンで回答する</label>
      <p class="note">自動判定の結果が選択されています。この端末の状況に合わせて変更できます。</p>
    </fieldset>
  </div>`,
  on_finish: (data) => {
    const f = data.response;
    participant_id = (f.pid || "").trim() || jsPsych.randomization.randomID(8);
    use_keyboard = (f.input_method === "keyboard");
    button_position = (f.handedness === "left") ? "left" : "right";
    jsPsych.data.addProperties({
      participant_id: participant_id,
      age: f.age,
      gender: f.gender,
      gender_detail: f.gender === "other" ? (f.gender_other || "") : "",
      handedness: f.handedness,
      input_mode: use_keyboard ? "keyboard" : "button",
      button_position: button_position
    });
  }
});

/* --- フルスクリーン化（デモグラフィック入力後・教示の前） --- */
timeline.push({
  type: jsPsychFullscreen,
  fullscreen_mode: true,
  message: `<p>ここからは<strong>全画面表示</strong>で実験を行います。</p>
            <p>下のボタンを押すと全画面に切り替わり，続いて説明が表示されます。</p>
            <p class="note">※実験が終了するまで，全画面表示を解除したり<br>
            他のアプリ・タブに切り替えたりしないでください。</p>`,
  button_label: "全画面にして説明へ進む",
  delay_after: 300,
  on_finish: () => {
    // ここから実験終了まで黒背景・白文字に切り替える
    document.documentElement.classList.add("dark-mode");
    jsPsych.data.addProperties({
      viewport_width_fullscreen: window.innerWidth,
      viewport_height_fullscreen: window.innerHeight
    });
  }
});

/* --- 教示（複数ページ） --- */
timeline.push({
  type: jsPsychInstructions,
  pages: () => {
    // 教示用の例示場面（Near位置・やや上の障害物）
    const example = sceneSVG(CONFIG.SCENE.OBSTACLE_X_NEAR, 2 * CONFIG.SCENE.STEP_Y, 520);

    const page1 = `
      <h2>課題の説明（1/3）</h2>
      <p>この実験では，下の図のような画面が表示されます。</p>
      ${example}
      <p style="max-width:640px; margin: 12px auto;">
      左の<strong style="color:${CONFIG.SCENE.COLOR_START};">灰色の円</strong>が<strong>スタート地点</strong>，
      右の<strong style="color:${CONFIG.SCENE.COLOR_GOAL};">水色の円</strong>が<strong>ゴール地点</strong>，
      中央付近の<strong style="color:${CONFIG.SCENE.COLOR_OBSTACLE};">赤色の円</strong>が<strong>障害物</strong>です。<br>
      障害物の位置は試行ごとに変わります。</p>`;

    const page2 = `
      <h2>課題の説明（2/3）</h2>
      <p style="max-width:640px; margin: 12px auto;">
      スタートからゴールまで，<strong>自分の腕（上肢）を動かして，手をゴールまで
      到達させる場面を想像してください</strong>。<br>
      （実際に腕を動かす必要はありません）</p>
      ${CONFIG.INSTRUCTION_IMAGE
        ? `<img class="inst-img" src="${CONFIG.INSTRUCTION_IMAGE}"
              alt="スタートからゴールまで腕を伸ばして到達する運動の例">`
        : ""}
      <p style="max-width:640px; margin: 12px auto;">
      その運動を行うとしたら，赤い障害物の<strong>上側</strong>と<strong>下側</strong>の
      どちらを通って回避する方が，<strong>できるだけ速く・正確に</strong>ゴールに
      到達できそうかを判断してください。</p>
      <p style="max-width:640px; margin: 12px auto;">
      この課題に決まった正解はありません。あなた自身の判断で回答してください。</p>`;

    const mapping_kb = `
      <h2>回答方法（3/3）</h2>
      <p style="max-width:640px; margin: 12px auto;">
      障害物の<strong>上側</strong>を通る方がよいと判断したら <strong>上矢印キー（↑）</strong>を，<br>
      <strong>下側</strong>を通る方がよいと判断したら <strong>下矢印キー（↓）</strong>を押してください。</p>
      <p>判断がついたら，<strong>すみやかに</strong>回答してください。</p>
      <p style="max-width:640px; margin: 12px auto;">
      まず練習を ${CONFIG.PRACTICE_TRIALS} 試行行い，そのあと本番（${CONFIG.N_BLOCKS} ブロック）に進みます。<br>
      ブロックの間には休憩をとることができます。</p>
      <p style="max-width:640px; margin: 12px auto;">
      「次へ」を押すと，練習開始前の確認画面に進みます（まだ練習は始まりません）。</p>`;

    const mapping_btn = `
      <h2>回答方法（3/3）</h2>
      <p style="max-width:640px; margin: 12px auto;">
      画面の${button_position === "right" ? "右下" : "左下"}に，矢印キーの形をした
      ボタンが表示されます。回答に使うのは<strong>↑と↓のみ</strong>です
      （左右のボタンは使用しません）。</p>
      <p style="max-width:640px; margin: 12px auto;">
      障害物の<strong>上側</strong>を通る方がよいと判断したら <strong>↑ボタン</strong>を，<br>
      <strong>下側</strong>を通る方がよいと判断したら <strong>↓ボタン</strong>をタップしてください。</p>
      <p>判断がついたら，<strong>すみやかに</strong>回答してください。</p>
      <p style="max-width:640px; margin: 12px auto;">
      まず練習を ${CONFIG.PRACTICE_TRIALS} 試行行い，そのあと本番（${CONFIG.N_BLOCKS} ブロック）に進みます。<br>
      ブロックの間には休憩をとることができます。</p>
      <p style="max-width:640px; margin: 12px auto;">
      「次へ」を押すと，練習開始前の確認画面に進みます（まだ練習は始まりません）。</p>`;

    return [page1, page2, use_keyboard ? mapping_kb : mapping_btn];
  },
  show_clickable_nav: true,
  button_label_previous: "戻る",
  button_label_next: "次へ"
});

/* --- 試行の部品 --- */

// 注視点：提示時間を FIXATION_MIN〜MAX の範囲でランダムに決定
const fixation = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: '<div style="font-size:48px;">+</div>',
  choices: "NO_KEYS",
  trial_duration: () =>
    jsPsych.randomization.randomInt(CONFIG.FIXATION_MIN, CONFIG.FIXATION_MAX),
  data: { task: "fixation" }
};

// 試行に付与する共通データ列
const trial_data = {
  task: "response",
  distance: jsPsych.timelineVariable("distance"),
  height_level: jsPsych.timelineVariable("height_level"),
  obstacle_x: jsPsych.timelineVariable("obs_x"),
  obstacle_y: jsPsych.timelineVariable("obs_y"),
  trial_kind: jsPsych.timelineVariable("trial_kind")
};

// キーボード条件（↑=上側回避，↓=下側回避）
const trial_keyboard = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: () => stimulusHTML(
    jsPsych.evaluateTimelineVariable("obs_x"),
    jsPsych.evaluateTimelineVariable("obs_y")),
  choices: [KEY_UP, KEY_DOWN],
  data: trial_data,
  on_finish: (data) => {
    data.chosen = jsPsych.pluginAPI.compareKeys(data.response, KEY_UP) ? "up" : "down";
  }
};

// タッチ条件（矢印キーパッドを利き手側の画面隅に配置）
const trial_button = {
  type: jsPsychHtmlButtonResponse,
  stimulus: () => stimulusHTML(
    jsPsych.evaluateTimelineVariable("obs_x"),
    jsPsych.evaluateTimelineVariable("obs_y")),
  choices: ["up", "down"],
  button_html: (choice, i) =>
    i === 0
      ? '<button class="arrow-key-btn key-up">↑</button>'
      : '<button class="arrow-key-btn key-down">↓</button>',
  css_classes: () => ["arrow-trial", "pos-" + button_position],
  on_load: () => {
    const grp = document.getElementById("jspsych-html-button-response-btngroup");
    const mkDeco = (symbol, cls) => {
      const b = document.createElement("button");
      b.className = "arrow-key-btn decorative " + cls;
      b.disabled = true;
      b.tabIndex = -1;
      b.textContent = symbol;
      return b;
    };
    grp.appendChild(mkDeco("←", "key-left"));
    grp.appendChild(mkDeco("→", "key-right"));
  },
  data: trial_data,
  on_finish: (data) => {
    data.chosen = (data.response === 0) ? "up" : "down";
  }
};

// 刺激間間隔（ISI）：回答後，次試行の注視点が出るまでの空白画面
const isi = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: "",
  choices: "NO_KEYS",
  trial_duration: () => CONFIG.ISI,
  data: { task: "isi" }
};

// ブロック開始時の空白画面（練習開始時・本番開始時・休憩後の再開時に挿入）
const block_start_blank = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: "",
  choices: "NO_KEYS",
  trial_duration: () => CONFIG.BLOCK_START_BLANK,
  data: { task: "block_start_blank" }
};

// 入力方法に応じてどちらかを実行する共通ユニット
const response_unit = [
  fixation,
  { timeline: [trial_keyboard], conditional_function: () => use_keyboard },
  { timeline: [trial_button],  conditional_function: () => !use_keyboard },
  isi
];

/* --- 練習開始の確認画面 --- */
timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: () => `
    <h2>練習の開始</h2>
    <p>これから練習を ${CONFIG.PRACTICE_TRIALS} 試行行います。</p>
    <p><strong>下のボタンを押すと，すぐに練習が始まります。</strong><br>
    ボタンを押すと画面中央に「＋」が表示され，続いて課題画面が提示されます。</p>
    <p>${use_keyboard
      ? "矢印キー（↑／↓）に指を置いて，"
      : "画面の" + (button_position === "right" ? "右下" : "左下") + "のボタンに指を添えて，"}
    準備ができたらボタンを押してください。</p>`,
  choices: ["練習を開始する"]
});

/* --- 練習ブロック（22点から重複ありランダム抽出・フィードバックなし） --- */
timeline.push(block_start_blank);
timeline.push({
  timeline: response_unit,
  timeline_variables: makePracticeTrialList(),
  data: { phase: "practice" }
});

// 練習終了 → 本番開始の画面（腕運動のイメージを再提示する）
timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: () => `
    <p>練習は以上です。ここからが本番です。</p>
    <p style="max-width:640px; margin: 12px auto;">
    やり方は練習と同じです。下の図のように，スタートからゴールまで
    <strong>自分の腕を動かして到達させる場面</strong>を想像し，<br>
    障害物の<strong>上側／下側</strong>のどちらを通る方が速く正確に
    到達できそうかを判断して回答してください。</p>
    ${CONFIG.INSTRUCTION_IMAGE
      ? `<img class="inst-img" src="${CONFIG.INSTRUCTION_IMAGE}"
            alt="スタートからゴールまで腕を伸ばして到達する運動の例">`
      : ""}
    <p><strong>下のボタンを押すと，すぐに本番が始まります。</strong><br>
    準備ができたらボタンを押してください。</p>`,
  choices: ["本番を開始する"]
});

/* --- 本試行：156試行（本試行140＋ダミー16をシャッフル）をブロックに分割 --- */
const all_trials = makeMainTrialList();
const per_block = Math.ceil(all_trials.length / CONFIG.N_BLOCKS);

for (let b = 1; b <= CONFIG.N_BLOCKS; b++) {
  const chunk = all_trials.slice((b - 1) * per_block, b * per_block);
  if (chunk.length === 0) break;

  // ブロック開始時（本番開始直後・休憩後の再開直後）の空白画面
  timeline.push(block_start_blank);

  timeline.push({
    timeline: response_unit,
    timeline_variables: chunk,
    data: { phase: "main", block: b }
  });

  if (b < CONFIG.N_BLOCKS) {
    timeline.push({
      type: jsPsychHtmlButtonResponse,
      stimulus: `<h2>休憩</h2>
                 <p>ブロック ${b} / ${CONFIG.N_BLOCKS} が終了しました。</p>
                 <p>必要なだけ休憩をとってください。<br>
                 <strong>下のボタンを押すと，すぐに次のブロックが始まります。</strong></p>`,
      choices: ["次のブロックを開始する"],
      data: { task: "rest" }
    });
  }
}

/* --- データ保存（DataPipe使用時のみ） --- */
if (CONFIG.DATAPIPE_EXPERIMENT_ID) {
  timeline.push({
    type: jsPsychPipe,
    action: "save",
    experiment_id: CONFIG.DATAPIPE_EXPERIMENT_ID,
    filename: () => `${participant_id}.csv`,
    data_string: () => jsPsych.data.get().csv()
  });
}

/* --- フルスクリーン解除 --- */
timeline.push({
  type: jsPsychFullscreen,
  fullscreen_mode: false,
  on_finish: () => {
    // 実験パートの終了に合わせて通常の配色に戻す
    document.documentElement.classList.remove("dark-mode");
  }
});

/* --- 終了画面 --- */
timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: "<p>実験は以上です。ご協力ありがとうございました。</p><p>この画面を閉じてください。</p>",
  choices: ["終了"]
});

jsPsych.run(timeline);
</script>
</html>
